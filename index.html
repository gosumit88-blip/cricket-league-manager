const app = document.getElementById("app");
let audioCtx = null;

function playTone(freq, dur, type="sine"){
  if(!Game.settings.sound) return;
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
    o.start(); o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function sfxDot(){ playTone(220,0.08); }
function sfxRun(){ playTone(330,0.1); }
function sfxFour(){ playTone(520,0.18,"triangle"); }
function sfxSix(){ playTone(660,0.28,"sawtooth"); }
function sfxWicket(){ playTone(120,0.35,"square"); }

function fmtOvers(balls){ return `${Math.floor(balls/6)}.${balls%6}`; }
function esc(s){ return (s+"").replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function formInfo(v){
  if(v>=80) return {label:"Excellent", cls:"form-excellent"};
  if(v>=65) return {label:"Good", cls:"form-good"};
  if(v>=45) return {label:"Average", cls:"form-average"};
  if(v>=25) return {label:"Poor", cls:"form-poor"};
  return {label:"Out of Form", cls:"form-out"};
}

function formArrow(p){
  if(p.formTrend==="up") return `<span class="form-arrow arrow-up" title="Form rising">▲</span>`;
  if(p.formTrend==="down") return `<span class="form-arrow arrow-down" title="Form falling">▼</span>`;
  return `<span class="form-arrow arrow-flat" title="Form steady">–</span>`;
}

/* ---------- Derived cricket stat helpers (used for both season & career) --- */
function battingAvg(s){ const outs = s.matches - s.notOuts; return outs>0 ? (s.runs/outs).toFixed(1) : (s.runs>0?s.runs.toFixed(1):"—"); }
function battingSR(s){ return s.balls>0 ? ((s.runs/s.balls)*100).toFixed(1) : "0.0"; }
function bowlingEcon(s){ return s.ballsBowled>0 ? (s.runsGiven/(s.ballsBowled/6)).toFixed(2) : "—"; }
function bowlingAvg(s){ return s.wickets>0 ? (s.runsGiven/s.wickets).toFixed(1) : "—"; }
function bestBowlingStr(s){ return s.bestBowlingWkts>0 ? `${s.bestBowlingWkts}/${s.bestBowlingRuns}` : "—"; }
function bowlingOversStr(s){ return `${s.oversBowled}.${s.ballsBowled - s.oversBowled*6}`; }

function teamBadge(team, size){
  size = size||44;
  const initials = team.short ? team.short.slice(0,3) : team.name.slice(0,3).toUpperCase();
  return `<div class="badge" style="width:${size}px;height:${size}px;
    background:linear-gradient(145deg, ${team.primary}, ${team.secondary});">
    <span class="badge-initials" style="font-size:${size*0.32}px;">${esc(initials)}</span>
    <span class="badge-star" style="font-size:${size*0.16}px;">★</span>
  </div>`;
}

function roleLabel(role){
  return {BAT:"Batsman", BOWL:"Bowler", AR:"All-rounder", WK:"Wicket-Keeper"}[role] || role;
}

function show(html, opts){
  opts = opts || {};
  // Any stray modal overlays (attached to body, outside #app) must not survive a screen change.
  document.querySelectorAll(".modal-overlay").forEach(el=>el.remove());
  app.innerHTML = html;
  if(opts.animate!==false){
    app.classList.remove("fade-in"); void app.offsetWidth; app.classList.add("fade-in");
  }
  if(opts.keepScroll!==true){
    window.scrollTo(0,0);
  }
}

function enforceOverseasCap(xi, squad){
  let overseasInXI = xi.filter(p=>p.overseas);
  let guard = 0;
  while(overseasInXI.length>MAX_OVERSEAS_IN_XI && guard<20){
    guard++;
    overseasInXI.sort((a,b)=>a.overallRating-b.overallRating);
    const toRemove = overseasInXI[0];
    const replacement = [...squad].sort((a,b)=>b.overallRating-a.overallRating)
      .find(p=>!p.overseas && !xi.some(x=>x.id===p.id));
    if(!replacement) break;
    xi = xi.map(p=>p.id===toRemove.id ? replacement : p);
    overseasInXI = xi.filter(p=>p.overseas);
  }
  return xi;
}

function isPlayerAvailable(p){
  return !(p.injury && p.injury.matchesRemaining>0) && !(p.nationalDutyUntil && p.nationalDutyUntil>0) && !p.retired;
}

function autoPickXI(team){
  let pool = team.squad.filter(isPlayerAvailable);
  if(pool.length<11) pool = [...team.squad].filter(p=>!p.retired); // fall back if too many are unavailable
  const byRating = [...pool].sort((a,b)=>b.overallRating-a.overallRating);
  let xi = byRating.slice(0,11);
  xi = enforceOverseasCap(xi, pool);
  if(!xi.some(p=>p.isWK)){
    const bestWK = pool.filter(p=>p.isWK).sort((a,b)=>b.overallRating-a.overallRating)[0];
    if(bestWK){ xi[xi.length-1] = bestWK; xi = enforceOverseasCap(xi, pool); }
  }
  xi.sort((a,b)=>a.battingPosition-b.battingPosition);
  team.playingXI = xi.map(p=>p.id);
  const byOverall = [...xi].sort((a,b)=>b.overallRating-a.overallRating);
  team.captainId = byOverall[0].id;
  team.vcId = byOverall[1] ? byOverall[1].id : byOverall[0].id;
  const wk = xi.find(p=>p.isWK);
  team.wkId = wk ? wk.id : xi[0].id;
}

function xiPlayers(team){
  if(!team.playingXI) autoPickXI(team);
  return team.playingXI.map(id=>team.squad.find(p=>p.id===id)).filter(Boolean);
}

function renderSelectXI(){
  const team = getUserTeam();
  let selected = new Set(team.playingXI || team.squad.slice(0,11).map(p=>p.id));
  function overseasCount(){
    return team.squad.filter(p=>selected.has(p.id) && p.overseas).length;
  }
  function draw(){
    const osCount = overseasCount();
    const rows = [...team.squad].sort((a,b)=>b.overallRating-a.overallRating).map(p=>{
      const unavailable = !isPlayerAvailable(p);
      const statusNote = p.injury && p.injury.matchesRemaining>0 ? `🩹 ${p.injury.matchesRemaining} left`
        : p.nationalDutyUntil>0 ? `✈️ ${p.nationalDutyUntil} left` : "";
      return `
      <label class="player-row select-row ${selected.has(p.id)?'in-xi':''} ${unavailable?'unavailable-row':''}">
        <input type="checkbox" data-id="${p.id}" ${selected.has(p.id)?"checked":""} ${(unavailable && !selected.has(p.id))?"disabled":""}/>
        <div class="player-main">
          <div class="player-name">${esc(p.name)} ${p.isWK?'<span class="tag tag-wk">WK</span>':''}${p.overseas?'<span class="tag tag-os">OVS</span>':''}</div>
          <div class="muted small">${roleLabel(p.role)} • OVR ${p.overallRating}${statusNote?` • <span class="status-warn">${statusNote}${selected.has(p.id)?" — tap to remove":""}</span>`:""}</div>
        </div>
      </label>`;
    }).join("");
    const chosen = team.squad.filter(p=>selected.has(p.id));
    const opts = id=>chosen.map(p=>`<option value="${p.id}" ${id===p.id?"selected":""}>${esc(p.name)}</option>`).join("");
    const selectedUnavailable = chosen.filter(p=>!isPlayerAvailable(p));
    show(`
    <div class="screen">
      <div class="topbar"><button class="icon-btn" id="btnBack">←</button><h2>Select Playing XI</h2></div>
      <div class="muted section-hint">${selected.size}/11 selected • Overseas ${osCount}/${MAX_OVERSEAS_IN_XI}</div>
      ${selectedUnavailable.length ? `<div class="card xi-warning-card">⚠️ ${selectedUnavailable.length} selected player${selectedUnavailable.length>1?"s are":" is"} unavailable (injured or on national duty). Untick ${selectedUnavailable.length>1?"them":"them"} below and pick a replacement before saving.</div>` : ""}
      <div class="card">${rows}</div>
      <div class="card xi-roles">
        <label>Captain <select id="selCap">${opts(team.captainId)}</select></label>
        <label>Vice-Captain <select id="selVC">${opts(team.vcId)}</select></label>
        <label>Wicket-Keeper <select id="selWK">${opts(team.wkId)}</select></label>
      </div>
      <button class="btn btn-primary btn-block sticky-btn" id="btnSaveXI" ${selected.size===11?"":"disabled"}>Save Playing XI</button>
    </div>`);
    document.getElementById("btnBack").onclick = renderSquad;
    document.querySelectorAll(".select-row input").forEach(cb=>{
      cb.onchange = ()=>{
        const id = cb.dataset.id;
        const player = team.squad.find(p=>p.id===id);
        if(cb.checked){
          if(selected.size>=11){ cb.checked=false; alert("You can only select 11 players."); return; }
          if(!isPlayerAvailable(player)){ cb.checked=false; alert("This player is currently unavailable (injured or on national duty)."); return; }
          if(player.overseas && overseasCount()>=MAX_OVERSEAS_IN_XI){
            cb.checked=false; alert(`Maximum ${MAX_OVERSEAS_IN_XI} overseas players allowed in the Playing XI.`); return;
          }
          selected.add(id);
        } else selected.delete(id);
        draw();
      };
    });
    const btn = document.getElementById("btnSaveXI");
    if(btn) btn.onclick = ()=>{
      team.playingXI = Array.from(selected);
      team.captainId = document.getElementById("selCap").value;
      team.vcId = document.getElementById("selVC").value;
      team.wkId = document.getElementById("selWK").value;
      const ok = saveGame();
      renderSquad();
      const banner = document.createElement("div");
      banner.className = "save-toast" + (ok ? "" : " save-toast-warn");
      banner.textContent = ok ? "✓ Playing XI saved!" : "Playing XI updated (offline save unavailable).";
      document.body.appendChild(banner);
      setTimeout(()=> banner.remove(), 2200);
    };
  }
  draw();
}

function renderFixtures(){

let autoTimer = null;

function speedMs(){
  return {slow:900, normal:500, fast:220}[Game.settings.commentarySpeed] || 500;
}

function handlePlayNext(){
  if(leagueStageComplete() && !Game.playoffState){
    setupPlayoffs();
    saveGame();
  }
  advanceNonUserFixtures();
  const fixture = nextFixtureForUser();
  if(!fixture){
    if(Game.playoffState && Game.playoffState.champion){ renderChampion(); }
    else { alert("No fixtures currently available."); renderDashboard(); }
    return;
  }
  const home = getTeam(fixture.homeId), away = getTeam(fixture.awayId);
  if(home.id!==Game.teamId) autoPickXI(home);
  if(away.id!==Game.teamId) autoPickXI(away);
  if(!home.playingXI) autoPickXI(home);
  if(!away.playingXI) autoPickXI(away);
  renderLineupsPreview(fixture, ()=> maybeTriggerStoryEvent(()=> renderPreMatch(fixture)));
}

function renderPreMatch(fixture){
  const home = getTeam(fixture.homeId), away = getTeam(fixture.awayId);

  Game.pendingFixture = fixture; Game.pendingVenue = venue;

  show(`<div class="screen prematch-screen">
    <div class="topbar"><button class="icon-btn" id="btnBack">←</button><h2>${fixture.stage==="league"?"Matchday "+fixture.matchday:fixture.stage==="Ultimate Clash"?"Ultimate Clash — "+fixture.matchday:fixture.stage}</h2></div>
    ${isRivalry ? `<div class="rivalry-banner">🔥 RIVALRY MATCH</div>` : ""}

function renderToss(){
  const fixture = Game.pendingFixture;
  const home = getTeam(fixture.homeId), away = getTeam(fixture.awayId);
  const userTeam = getTeam(Game.teamId);
  show(`<div class="screen toss-screen">
    <h2>Toss Time</h2>
    <div class="coin" id="coin"><div class="coin-face">🪙</div></div>
    <p class="muted">Call it in the air — heads or tails?</p>
    <div class="btn-row">
      <button class="btn btn-secondary" id="btnHeads">Heads</button>
      <button class="btn btn-secondary" id="btnTails">Tails</button>
    </div>
    <div id="tossResult" class="toss-result"></div>
  </div>`);
  const callToss = (call)=>{
    document.getElementById("btnHeads").disabled = true;
    document.getElementById("btnTails").disabled = true;
    document.getElementById("coin").classList.add("flipping");
    const actual = Math.random()<0.5 ? "heads" : "tails";
    setTimeout(()=>{
      const userWonToss = call===actual;
      const winnerTeam = userWonToss ? userTeam : (userTeam.id===home.id ? away : home);
      const resDiv = document.getElementById("tossResult");
      if(winnerTeam.id===userTeam.id){
        resDiv.innerHTML = `<p>It's <b>${actual}</b>! You won the toss. What will you do?</p>
          <div class="btn-row">
            <button class="btn btn-primary" id="btnBat">Bat First</button>
            <button class="btn btn-primary" id="btnBowl">Bowl First</button>
          </div>`;
        document.getElementById("btnBat").onclick = ()=>beginMatch(fixture, userTeam.id);
        document.getElementById("btnBowl").onclick = ()=>beginMatch(fixture, userTeam.id===home.id?away.id:home.id);
      } else {
        const decision = aiTossDecision(winnerTeam, Game.pendingVenue);
        resDiv.innerHTML = `<p>It's <b>${actual}</b>! ${esc(winnerTeam.name)} won the toss and chose to ${decision} first.</p>
          <button class="btn btn-primary" id="btnContinueToss">Continue</button>`;
        document.getElementById("btnContinueToss").onclick = ()=>{
          const battingFirst = decision==="bat" ? winnerTeam.id : (winnerTeam.id===home.id?away.id:home.id);
          beginMatch(fixture, battingFirst);
        };
      }
    }, 1200);
  };
  document.getElementById("btnHeads").onclick = ()=>callToss("heads");
  document.getElementById("btnTails").onclick = ()=>callToss("tails");
}

function beginMatch(fixture, battingFirstId){
  const home = getTeam(fixture.homeId), away = getTeam(fixture.awayId);
  if(home.id!==Game.teamId) autoPickXI(home);
  if(away.id!==Game.teamId) autoPickXI(away);
  if(!home.playingXI) autoPickXI(home);
  if(!away.playingXI) autoPickXI(away);

  const homeXI = xiPlayers(home), awayXI = xiPlayers(away);
  const match = createMatch(home, away, homeXI, awayXI, Game.pendingVenue);
  match.stage = fixture.stage;
  const battingTeam = battingFirstId===home.id ? home : away;
  const bowlingTeam = battingFirstId===home.id ? away : home;
  const battingXI = battingFirstId===home.id ? homeXI : awayXI;
  const bowlingXI = battingFirstId===home.id ? awayXI : homeXI;
  startInnings(match, battingTeam, battingXI, bowlingTeam, bowlingXI, null);
  Game.currentMatch = match;
  Game._lmBuiltInnings = -1;
  Game._lmCommentaryShown = 0;
  Game.autoPlayMultiplier = Game.autoPlayMultiplier || 1;
  renderLiveMatch();
}

/* Runs up to `count` deliveries in a row without re-rendering between them,
   stopping early if the innings/match needs user input or has finished. */
function tickBatch(count){
  const match = Game.currentMatch;
  for(let i=0;i<count;i++){
    const inn = currentInnings(match);
    if(inn.complete || match.finished) return;
    const res = simulateStep(match);
    if(res && res.needBowler){ stopAutoPlay(); renderLiveMatch(); return; }
    if(res && res.entry){
      const o = res.entry.outcome;
      if(o==="four") sfxFour(); else if(o==="six") sfxSix(); else if(o.startsWith("wicket")) sfxWicket();
      else if(o==="dot") sfxDot(); else sfxRun();
    }
    if(res && res.rainDelay){
      stopAutoPlay();
      renderLiveMatch();
      renderRainDelayModal(res.rainDelay);
      return;
    }
    if(inn.complete){
      stopAutoPlay();
      if(match.innings.length===1){
        const target = inn.score+1;
        startInnings(match, inn.bowlingTeam, inn.bowlingXI, inn.battingTeam, inn.battingXI, target);
      } else {
        finishMatchIfDone(match);
        if(Game.pendingFixture && Game.pendingFixture.stage==="Ultimate Clash"){
          finalizeUltimateClashMatch(match);
        } else {
          finalizeMatch(match);
        }
        renderMatchResult();
        return;
      }
    }
  }
  renderLiveMatch();
}

function tick(){ tickBatch(1); }

function startAutoPlay(){
  stopAutoPlay();
  autoTimer = setInterval(()=>{
    const inn = currentInnings(Game.currentMatch);
    if(inn.awaitingBowler || Game.currentMatch.finished){ stopAutoPlay(); renderLiveMatch(); return; }
    tickBatch(Game.autoPlayMultiplier || 1);
  }, speedMs());
}
function stopAutoPlay(){ if(autoTimer){ clearInterval(autoTimer); autoTimer=null; } }

/* ---------------------- Live match: flicker-free DOM updates -------------- */
function setTextAnimated(el, newText){
  if(!el) return;
  if(el.textContent!==newText){
    el.textContent = newText;
    el.classList.remove("digit-pop"); void el.offsetWidth; el.classList.add("digit-pop");
  }
}

const PHASE_INFO = {
  powerplay: { label:"Powerplay", icon:"⚡" },
  middle:    { label:"Middle Overs", icon:"⏳" },
  death:     { label:"Death Overs", icon:"🔥" }
};

function ballChipHtml(code){
  let cls = "ball-chip", label = code;
  if(code==="W"){ cls += " ball-wicket"; }
  else if(code==="4"){ cls += " ball-four"; }
  else if(code==="6"){ cls += " ball-six"; }
  else if(code==="wd"||code==="nb"){ cls += " ball-extra"; }
  else if(code==="0"){ cls += " ball-dot"; }
  return `<span class="${cls}">${esc(label)}</span>`;
}

function updateLiveMatchDOM(){
  const match = Game.currentMatch;
  const inn = currentInnings(match);
  const striker = inn.battersState[inn.strikerId], nonStriker = inn.battersState[inn.nonStrikerId];
  const strikerP = findInXI(inn.battingXI, inn.strikerId), nonStrikerP = findInXI(inn.battingXI, inn.nonStrikerId);
  const bowlerP = inn.currentBowlerId ? findInXI(inn.bowlingXI, inn.currentBowlerId) : null;
  const bowlerStat = bowlerP ? inn.bowlerStats[bowlerP.id] : null;
  const crr = inn.legalBalls>0 ? (inn.score/(inn.legalBalls/6)) : 0;
  const rrr = inn.target ? computeRRR(inn) : null;

  const phase = phaseOf(inn.legalBalls, inn.oversLimit);
  const pInfo = PHASE_INFO[phase];
  const banner = document.getElementById("lmPhaseBanner");
  banner.className = "phase-banner phase-"+phase;
  banner.innerHTML = `${pInfo.icon} ${pInfo.label}`;

  setTextAnimated(document.getElementById("lmScore"), `${inn.score}/${inn.wickets}`);
  document.getElementById("lmOvers").textContent = `(${fmtOvers(inn.legalBalls)} ov)`;
  document.getElementById("lmSub").textContent = `CRR ${crr.toFixed(2)}` + (rrr!=null ? ` • Need ${Math.max(0,inn.target-inn.score)} from ${inn.oversLimit*6-inn.legalBalls} balls` : "");
  document.getElementById("lmTarget").textContent = inn.target ? `Target: ${inn.target}` + (rrr!=null?` • RRR ${rrr>0?rrr.toFixed(2):"0.00"}`:"") : "";
  document.getElementById("lmExtras").textContent = `Extras: ${inn.extras} (wd ${inn.extrasBreakdown.wide}, nb ${inn.extrasBreakdown.noball}) • Partnership: ${inn.partnership.runs} (${inn.partnership.balls})`;

  const pressWrap = document.getElementById("lmPressureWrap");
  if(rrr!=null){
    pressWrap.style.display = "block";
    const maxScale = Math.max(crr, rrr, 6) * 1.15;
    const crrPct = clamp((crr/maxScale)*100, 2, 100);
    const rrrPct = clamp((rrr/maxScale)*100, 2, 100);
    const hot = rrr>crr+2;
    document.getElementById("lmPressureFill").style.width = rrrPct+"%";
    document.getElementById("lmPressureFill").className = "pressure-fill" + (hot?" pressure-hot":"");
    document.getElementById("lmPressureFill").style.setProperty("--crrPct", crrPct+"%");
  } else {
    pressWrap.style.display = "none";
  }

  const overRow = document.getElementById("lmThisOver");
  overRow.innerHTML = `<span class="muted small">This over:</span>` + (inn.thisOverEvents.length
    ? inn.thisOverEvents.map(ballChipHtml).join("")
    : `<span class="muted small">—</span>`);

  const strikerName = strikerP ? (strikerP.shortName||strikerP.name) : "-";
  const nonStrikerName = nonStrikerP ? (nonStrikerP.shortName||nonStrikerP.name) : "-";
  const strikerSR = striker && striker.balls>0 ? ((striker.runs/striker.balls)*100).toFixed(0) : "0";
  document.getElementById("lmStrikerName").innerHTML = `<span class="strike-dot"></span>${esc(strikerName)} ${strikerP?formArrow(strikerP):""}`;
  setTextAnimated(document.getElementById("lmStrikerScore"), `${striker?striker.runs:0} (${striker?striker.balls:0}) SR ${strikerSR}`);
  document.getElementById("lmNonStrikerName").textContent = nonStrikerName;
  setTextAnimated(document.getElementById("lmNonStrikerScore"), `${nonStriker?nonStriker.runs:0} (${nonStriker?nonStriker.balls:0})`);

  if(bowlerP){
    const wktCls = bowlerStat.wickets>=2 ? "bowler-hot" : "";
    document.getElementById("lmBowlerLine").innerHTML =
      `<span class="${wktCls}">${esc(bowlerP.shortName||bowlerP.name)}${bowlerP.overseas?' <span class="tag tag-os">OVS</span>':''}: <b>${bowlerStat.wickets}/${bowlerStat.runs}</b> (${bowlerStat.overs}.${inn.thisOverBalls} ov)</span> • ${esc(STRATEGY_LABELS[inn.currentBowlingType]||inn.currentBowlingType)}`;
  } else {
    document.getElementById("lmBowlerLine").textContent = "Selecting bowler...";
  }

  const isUserBattingNow = isUserBatting(match, inn);
  const stratBox = document.getElementById("lmStrategyCard");
  if(isUserBattingNow){
    if(stratBox.dataset.mode!=="user"){
      stratBox.dataset.mode = "user";
      stratBox.innerHTML = `<div class="muted small">Batting Strategy</div>
        <div class="segmented segmented-4" id="segBatStrat">${Object.keys(STRATEGY_LABELS).map(k=>`<button data-strat="${k}">${STRATEGY_LABELS[k]}</button>`).join("")}</div>`;
      stratBox.querySelectorAll("#segBatStrat button").forEach(b=> b.onclick = ()=>{
        inn.currentBattingStrategy = b.dataset.strat;
        updateLiveMatchDOM();
      });
    }
    stratBox.querySelectorAll("#segBatStrat button").forEach(b=> b.classList.toggle("active", b.dataset.strat===inn.currentBattingStrategy));
  } else {
    stratBox.dataset.mode = "ai";
    stratBox.innerHTML = `<div class="muted small">Opponent Batting Approach: <b>${esc(STRATEGY_LABELS[inn.currentBattingStrategy]||inn.currentBattingStrategy)}</b></div>`;
  }

  const feed = document.getElementById("lmCommentary");
  const total = inn.commentary.length;
  const shown = Game._lmCommentaryShown || 0;
  if(total>shown){
    const newOnes = inn.commentary.slice(0, total-shown);
    for(let i=newOnes.length-1;i>=0;i--){
      const c = newOnes[i];
      const div = document.createElement("div");
      div.className = "comm-line new-line" +
        (c.outcome.startsWith("wicket")?" comm-wicket":"") +
        ((c.outcome==="four"||c.outcome==="six")?" comm-boundary":"") +
        (c.outcome==="milestone"?" comm-milestone":"") +
        (c.outcome==="rain"?" comm-rain":"");
      div.innerHTML = c.outcome==="milestone" ? `<span class="comm-over">Ov ${c.over}</span> 🎉 ${esc(c.text)}`
        : c.outcome==="rain" ? `<span class="comm-over">Ov ${c.over}</span> 🌧️ ${esc(c.text)}`
        : `<span class="comm-over">Ov ${c.over}</span> <b>${esc(c.bowler)}</b> to ${esc(c.batter)}: ${esc(c.text)}`;
      feed.insertBefore(div, feed.firstChild);
      if(c.outcome==="milestone") flashMilestone(c.text);
    }
    Game._lmCommentaryShown = total;
    while(feed.children.length>14) feed.removeChild(feed.lastChild);
  } else if(total===0 && feed.children.length===0){
    feed.innerHTML = "<div class='muted'>Match about to begin...</div>";
  }

  const autoBtn = document.getElementById("btnAuto");
  if(autoBtn) autoBtn.textContent = autoTimer ? "Pause" : "Auto Play";
  const nextBtn = document.getElementById("btnNextBall");
  if(nextBtn) nextBtn.disabled = !!match.finished;
}

function flashMilestone(text){
  const flash = document.createElement("div");
  flash.className = "milestone-flash";
  flash.innerHTML = `🎉 ${esc(text)}`;
  document.body.appendChild(flash);
  setTimeout(()=> flash.classList.add("milestone-flash-out"), 1800);
  setTimeout(()=> flash.remove(), 2300);
}

function renderLiveMatch(){
  const match = Game.currentMatch;
  const inn = currentInnings(match);
  const needsBowlerUI = inn.awaitingBowler && isUserBowling(match, inn) && !Game.settings.autoBowler;
  const root = document.getElementById("liveMatchRoot");
  if(!root || Game._lmBuiltInnings!==match.currentInningsIndex){
    buildLiveMatchDOM();
  } else {
    updateLiveMatchDOM();
  }
  if(needsBowlerUI){ renderBowlerModal(match, inn); }
}

function renderFullScorecard(match){
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  const inningsHtml = match.innings.map((inn,idx)=>{
    const battingRows = inn.order.map(p=>{
      const bs = inn.battersState[p.id];
      if(bs.balls===0 && !bs.out && p.id!==inn.strikerId && p.id!==inn.nonStrikerId) return "";
      const sr = bs.balls>0 ? ((bs.runs/bs.balls)*100).toFixed(1) : "0.0";
      const status = bs.out ? esc(bs.howOut) : (p.id===inn.strikerId?"batting*":p.id===inn.nonStrikerId?"batting":"not out");
      return `<div class="sc-row"><span class="sc-name">${esc(p.name)}<br><span class="muted small">${status}</span></span>
        <span>${bs.runs}</span><span>${bs.balls}</span><span>${bs.fours}</span><span>${bs.sixes}</span><span>${sr}</span></div>`;
    }).join("");
    const bowlingRows = inn.bowlingXI.filter(p=>inn.bowlerStats[p.id].balls>0).map(p=>{
      const bw = inn.bowlerStats[p.id];
      const econ = bw.balls>0 ? (bw.runs/(bw.balls/6)).toFixed(2) : "0.00";
      return `<div class="sc-row"><span class="sc-name">${esc(p.name)}</span><span>${bw.overs}.${bw.balls-bw.overs*6}</span><span>${bw.maidens}</span><span>${bw.runs}</span><span>${bw.wickets}</span><span>${econ}</span></div>`;
    }).join("");
    const fowHtml = inn.fallOfWickets.map(f=>`${f.wicket}-${f.score} (${esc(f.batter)}, ${f.over} ov)`).join(", ");
    return `<div class="sc-innings">
      <div class="section-hint">${esc(inn.battingTeam.name)} Innings — ${inn.score}/${inn.wickets} (${fmtOvers(inn.legalBalls)} ov)</div>
      <div class="sc-row sc-head"><span class="sc-name">Batter</span><span>R</span><span>B</span><span>4s</span><span>6s</span><span>SR</span></div>
      ${battingRows}
      <div class="sc-row sc-head" style="margin-top:8px;"><span class="sc-name">Bowler</span><span>O</span><span>M</span><span>R</span><span>W</span><span>Econ</span></div>
      ${bowlingRows}
      ${fowHtml ? `<div class="muted small" style="margin-top:8px;">Fall of wickets: ${fowHtml}</div>` : ""}
    </div>`;
  }).join("<hr class='sc-divider'/>");

  overlay.innerHTML = `<div class="modal-card scorecard-modal">
    <h3>Full Scorecard</h3>
    ${inningsHtml}
    <button class="btn btn-secondary btn-block" id="btnCloseScorecard">Close</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector("#btnCloseScorecard").onclick = ()=> overlay.remove();
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
}

const RAIN_WAIT_SECONDS = 60;

function renderRainDelayModal(info){
  document.querySelectorAll(".modal-overlay").forEach(el=>el.remove());
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay rain-modal";
  overlay.innerHTML = `<div class="modal-card">
    <div class="rain-icon">🌧️</div>
    <h3>Rain Stops Play!</h3>
    <p class="muted small">The covers are on at ${esc(Game.currentMatch.venue.stadium)}. No overs will be lost —
    play will resume shortly at ${esc(fmtOvers(info.oversBowled*6))} overs, still targeting the full
    ${info.oversLimit} overs${info.target?` (chasing ${info.target})`:""}.</p>
    <div class="rain-wait-track"><div class="rain-wait-fill" id="rainWaitFill"></div></div>
    <div class="muted small" id="rainWaitLabel">Waiting for the umpires' inspection… ${RAIN_WAIT_SECONDS}s</div>
    <button class="btn btn-secondary btn-block" id="btnSkipWait" style="margin-top:12px;">Skip Wait</button>
    <button class="btn btn-primary btn-block" id="btnResumePlay" style="margin-top:8px; display:none;">Resume Play</button>
  </div>`;
  document.body.appendChild(overlay);

  const fill = overlay.querySelector("#rainWaitFill");
  const label = overlay.querySelector("#rainWaitLabel");
  const skipBtn = overlay.querySelector("#btnSkipWait");
  const resumeBtn = overlay.querySelector("#btnResumePlay");
  let elapsed = 0;
  const finish = ()=>{
    clearInterval(waitTimer);
    fill.style.width = "100%";
    label.textContent = "Covers are off — ready to resume!";
    skipBtn.style.display = "none";
    resumeBtn.style.display = "block";
  };
  const waitTimer = setInterval(()=>{
    elapsed += 1;
    const pct = Math.min(100, Math.round((elapsed/RAIN_WAIT_SECONDS)*100));
    fill.style.width = pct+"%";
    const remaining = Math.max(0, RAIN_WAIT_SECONDS-elapsed);
    label.textContent = `Waiting for the umpires' inspection… ${remaining}s`;
    if(elapsed>=RAIN_WAIT_SECONDS) finish();
  }, 1000);

  skipBtn.onclick = ()=> finish();
  resumeBtn.onclick = ()=>{ clearInterval(waitTimer); overlay.remove(); renderLiveMatch(); };
}

function renderBowlerModal(match, inn){
  const options = eligibleBowlers(inn);
  document.querySelectorAll(".modal-overlay").forEach(el=>el.remove());
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `<div class="modal-card">
    <h3>Select Bowler</h3>
    <div class="bowler-list">

/* ---------------------- Finalize / Result / Champion --------------------- */
function updateFormTrend(p, delta){
  p.formPrev = p.form;
  p.form = clamp(p.form + delta, 10, 99);
  p.formTrend = p.form>p.formPrev ? "up" : p.form<p.formPrev ? "down" : "flat";
}

function applyBattingLine(s, bs){
  s.runs += bs.runs; s.balls += bs.balls; s.fours += bs.fours; s.sixes += bs.sixes;
  if(!bs.out) s.notOuts += 1;
  s.highScore = Math.max(s.highScore, bs.runs);
  if(bs.runs>=100) s.hundreds += 1;
  else if(bs.runs>=50) s.fifties += 1;
}

function applyBowlingLine(s, bw){
  s.oversBowled += bw.overs; s.ballsBowled += bw.balls;
  s.maidens += bw.maidens; s.runsGiven += bw.runs; s.wickets += bw.wickets;
  const better = bw.wickets>s.bestBowlingWkts || (bw.wickets===s.bestBowlingWkts && bw.wickets>0 && bw.runs<s.bestBowlingRuns);
  if(bw.wickets>0 && better){ s.bestBowlingWkts = bw.wickets; s.bestBowlingRuns = bw.runs; }
}

function transferStatsToPlayers(match){
  match.innings.forEach(inn=>{
    inn.battingXI.forEach(p=>{
      const bs = inn.battersState[p.id];
      applyBattingLine(p.stats, bs);
      applyBattingLine(p.seasonStats, bs);
      const delta = bs.runs>=50?12:bs.runs>=30?6:(bs.runs<10&&bs.balls>=8?-8:2);
      updateFormTrend(p, delta);
    });
    inn.bowlingXI.forEach(p=>{
      const bw = inn.bowlerStats[p.id];
      if(bw.balls>0){
        applyBowlingLine(p.stats, bw);
        applyBowlingLine(p.seasonStats, bw);
        if(bw.wickets>=3) updateFormTrend(p, 10);
      }
    });
  });
  const allPlayers = new Set([...match.homeXI, ...match.awayXI]);
  allPlayers.forEach(p=>{ p.stats.matches += 1; p.seasonStats.matches += 1; p.value = computePlayerValue(p); });
}

/* Picks Player of the Match and returns a detailed stat line for the announcement. */
function pickPlayerOfMatch(match){
  let best = null, bestScore = -1, bestTeam = null;
  match.innings.forEach(inn=>{
    inn.battingXI.forEach(p=>{
      const bs = inn.battersState[p.id];
      const score = bs.runs + (bs.balls>0 && bs.runs/bs.balls>=1.3 ? 10 : 0);
      if(score>bestScore){ bestScore=score; best=p; bestTeam=inn.battingTeam; }
    });
    inn.bowlingXI.forEach(p=>{
      const bw = inn.bowlerStats[p.id];
      if(bw.balls===0) return;
      const score = bw.wickets*22 - bw.runs*0.3;
      if(score>bestScore){ bestScore=score; best=p; bestTeam=inn.bowlingTeam; }
    });
  });
  if(!best) return null;
  let battingLine = null, bowlingLine = null;
  match.innings.forEach(inn=>{
    if(inn.battersState[best.id]){
      const bs = inn.battersState[best.id];
      if(bs.balls>0) battingLine = `${bs.runs} (${bs.balls} balls, ${bs.fours}x4, ${bs.sixes}x6)`;
    }
    if(inn.bowlerStats[best.id] && inn.bowlerStats[best.id].balls>0){
      const bw = inn.bowlerStats[best.id];
      bowlingLine = `${bw.wickets}/${bw.runs} (${bw.overs}.${bw.balls-bw.overs*6} overs)`;
    }
  });
  best.stats.potm += 1;
  best.seasonStats.potm += 1;
  return { player: best, team: bestTeam, battingLine, bowlingLine };
}

/* Generates a short, original post-match analysis paragraph from the match data. */
function generateExpertAnalysis(match, fixture, potmDetail){
  const inn1 = match.innings[0], inn2 = match.innings[1];
  const margin = fixture.result;
  const lines = [];

  const closeGame = inn2.target!=null && Math.abs(inn2.target-1-inn2.score) <= 12 && inn2.wickets>=7;
  if(margin.winnerId===null){
    lines.push(`A pulsating contest at ${match.venue.stadium} ended in a tie, with both sides unable to be separated after their overs.`);
  } else {
    const winnerName = getTeam(margin.winnerId).name;
    lines.push(closeGame
      ? `${winnerName} held their nerve in a nail-biting finish at ${match.venue.stadium}, sealing the win in the closing stages.`
      : `${winnerName} were clinical from start to finish, cruising to a comfortable win at ${match.venue.stadium}.`);
  }

  const topInn = inn1.score>=inn2.score ? inn1 : inn2;
  const topBatArr = topInn.battingXI.map(p=>({p, bs:topInn.battersState[p.id]})).sort((a,b)=>b.bs.runs-a.bs.runs);
  if(topBatArr[0] && topBatArr[0].bs.runs>0){
    const share = Math.round((topBatArr[0].bs.runs/Math.max(topInn.score,1))*100);
    lines.push(`${topBatArr[0].p.name}'s knock of ${topBatArr[0].bs.runs} off ${topBatArr[0].bs.balls} balls made up roughly ${share}% of the highest total, setting the tone for the innings.`);
  }

  const allBowlers = [...inn1.bowlingXI.map(p=>({p,bw:inn1.bowlerStats[p.id]})), ...inn2.bowlingXI.map(p=>({p,bw:inn2.bowlerStats[p.id]}))]
    .filter(x=>x.bw.balls>0).sort((a,b)=>b.bw.wickets-a.bw.wickets || a.bw.runs-b.bw.runs);
  if(allBowlers[0] && allBowlers[0].bw.wickets>=2){
    lines.push(`${allBowlers[0].p.name} was the standout with the ball, finishing with figures of ${allBowlers[0].bw.wickets}/${allBowlers[0].bw.runs} and repeatedly breaking partnerships at key moments.`);
  }

  const pitchNote = {
    "Green Pitch": "The seam-friendly surface troubled batters throughout and rewarded disciplined fast bowling.",
    "Dry Pitch": "A dry surface gave the spinners plenty of purchase as the match wore on.",
    "Flat Pitch": "A true, flat batting surface meant boundaries came at a premium rate all match.",
    "Dusty Pitch": "Increasing dust off the surface made batting progressively harder in the second innings.",
    "Turning Pitch": "Sharp turn was on offer for the spinners, and it proved the difference in a tactical contest."
  }[match.venue.pitch];
  if(pitchNote) lines.push(pitchNote);

  if(potmDetail){
    lines.push(`${potmDetail.player.name} deservedly walks away with the Player of the Match award for a match-defining contribution.`);
  }

  return lines.join(" ");
}

function finalizeMatch(match){
  transferStatsToPlayers(match);
  const potmDetail = pickPlayerOfMatch(match);
  const inn1 = match.innings[0], inn2 = match.innings[1];
  const home = match.home, away = match.away;
  const homeInn = inn1.battingTeam.id===home.id ? inn1 : inn2;
  const awayInn = inn1.battingTeam.id===home.id ? inn2 : inn1;
  const homeScore = homeInn.score, homeWkts = homeInn.wickets, homeOvers = homeInn.legalBalls/6;
  const awayScore = awayInn.score, awayWkts = awayInn.wickets, awayOvers = awayInn.legalBalls/6;

  const winner = recordResult(home, away, homeScore, awayScore, homeOvers, awayOvers);
  const fixture = Game.pendingFixture;
  fixture.played = true;
  fixture.result = {
    homeScore, homeWkts, awayScore, awayWkts, winnerId: winner?winner.id:null,
    potm: potmDetail?potmDetail.player.name:null, resultText: match.resultText
  };

  const reward = applyMatchReward(fixture, home, away, winner);
  fixture.result.reward = reward;
  applyPostMatchClubEffects(home, away, winner);
  if(home.id===Game.teamId || away.id===Game.teamId){
    const userTeam = getUserTeam();
    tickPlayerAvailability(userTeam);
    maybeInjurePlayers(userTeam, userTeam.playingXI);
  }
  fixture.result.potmDetail = potmDetail ? {
    name: potmDetail.player.name, team: potmDetail.team.short,
    battingLine: potmDetail.battingLine, bowlingLine: potmDetail.bowlingLine,
    overseas: potmDetail.player.overseas
  } : null;
  fixture.result.analysis = generateExpertAnalysis(match, fixture, potmDetail);

  if(fixture.stage!=="league"){
    let winnerId = winner ? winner.id : (home.rating>=away.rating? home.id: away.id); // tie-break fallback
    let loserId = winnerId===home.id ? away.id : home.id;
    onPlayoffMatchComplete(fixture, winnerId, loserId);
  } else {
    quickSimMatchday(fixture.matchday);
  }
  saveGame();
}

function maybeTriggerStoryEvent(after){
  if(Game.storyEventCooldown===undefined) Game.storyEventCooldown = 1;
  if(Game.storyEventCooldown>0){ Game.storyEventCooldown -= 1; after(); return; }
  if(Math.random()>0.35){ Game.storyEventCooldown = rand(1,2); after(); return; }
  const team = getUserTeam();
  const eligible = STORY_EVENTS.filter(e=> !e.condition || e.condition(team));
  if(!eligible.length){ after(); return; }
  const event = eligible[rand(0, eligible.length-1)];

  renderStoryEvent(event, after);
}

/* =========================================================
   CRICKET LEAGUE MANAGER 26 — ui-auction.js
   Season-start player auction. AI franchises from the same
   league bid with their own real budgets — they can genuinely
   outbid the user and sign the player themselves.
   ========================================================= */

function auctionRivalPool(){
  const league = getLeague();
  return league.teams.filter(t=>t.id!==Game.teamId);
}

/* Picks an AI team willing to raise the bid on this player, weighted by how
   much they need the role, their budget headroom, and a little randomness.
   Returns null if no AI team wants to (or can afford to) counter. */
function aiConsiderBid(player, currentBid, rivals){
  const nextBid = Math.round(currentBid*1.1/1000)*1000;
  const candidates = rivals.filter(t=> canMakeRoomFor(t, player) && t.budget>=Math.round(nextBid*1.15));
  if(!candidates.length) return null;

  const weighted = candidates.map(t=>{
    const roleCount = t.squad.filter(p=>p.role===player.role).length;
    const needFactor = clamp(1.4 - roleCount*0.15, 0.3, 1.4);
    const budgetFactor = clamp(t.budget/STARTING_BUDGET, 0.3, 2.5);
    const qualityFactor = player.overallRating>=75 ? 1.3 : 1.0;
    const w = needFactor*budgetFactor*qualityFactor + Math.random()*0.6;
    return { team:t, w };
  });
  weighted.sort((a,b)=>b.w-a.w);

  const baseChance = clamp(0.22 + (player.overallRating-60)/110, 0.08, 0.6);
  if(Math.random()>baseChance) return null;
  return weighted[0].team;
}

function renderAuction(afterDone){
  const team = getUserTeam();
  const pool = generateFreeAgents(10);
  const rivals = auctionRivalPool();
  let idx = 0;

  function nextPlayer(){
    if(idx>=pool.length){ afterDone(); return; }
    const player = pool[idx];
    let currentBid = Math.round(player.value*0.6/1000)*1000;
    let round = 0;
    const maxRounds = 6;
    let leadingRival = null; // the AI team currently holding the top bid, if any

    function draw(msg){
      const rivalLine = leadingRival ? `<div class="muted small">Leading Bidder: <b>${esc(leadingRival.name)}</b></div>` : "";
      show(`<div class="screen auction-screen">
        <div class="topbar"><h2>🔨 Player Auction (${idx+1}/${pool.length})</h2></div>
        <div class="card">
          <div class="player-name" style="font-size:18px;">${esc(player.name)} <span class="tag">${esc(nationalityLabel(player.nationality))}</span></div>
          <div class="muted small">${roleLabel(player.role)} • Age ${player.age} • OVR ${player.overallRating}${player.bowlingStyle?" • "+esc(player.bowlingStyle):""}</div>
          <div class="muted small personality-line">🎭 ${esc(player.personality)}</div>
        </div>
        <div class="card auction-bid-card">
          <div class="muted small">Current Bid</div>
          <div class="auction-bid-amount">${fmtMoney(currentBid)}</div>
          <div class="muted small">Your Purse: ${fmtMoney(team.budget)}</div>
          ${rivalLine}
        </div>
        ${msg?`<div class="card training-msg">${msg}</div>`:""}
        <div class="btn-row">
          <button class="btn btn-secondary" id="btnPass">Pass</button>
          <button class="btn btn-primary" id="btnBid" ${team.budget<Math.round(currentBid*1.1)||team.squad.length>=18?"disabled":""}>Raise Bid</button>
        </div>
        <button class="btn btn-ghost btn-block" id="btnSkipAuction">Skip Remaining Auction</button>
      </div>`);

      document.getElementById("btnPass").onclick = ()=>{
        if(leadingRival && leadingRival.budget>=currentBid && canMakeRoomFor(leadingRival, player)){
          makeRoomFor(leadingRival, player);
          leadingRival.budget -= currentBid;
          leadingRival.squad.push(player);
          idx++;
          showSoldScreen(`${esc(player.name)} is SOLD to ${esc(leadingRival.name)} for ${fmtMoney(currentBid)}!`, false);
        } else {
          idx++;
          nextPlayer();
        }
      };
      document.getElementById("btnSkipAuction").onclick = ()=> afterDone();
      const bidBtn = document.getElementById("btnBid");
      if(bidBtn) bidBtn.onclick = ()=>{
        currentBid = Math.round(currentBid*1.1/1000)*1000;
        leadingRival = null; // user now leads
        round++;
        if(round<maxRounds){
          const counter = aiConsiderBid(player, currentBid, rivals);
          if(counter){
            currentBid = Math.round(currentBid*1.08/1000)*1000;
            leadingRival = counter;
            draw(`${esc(counter.name)} raises the bid! Round ${round}/${maxRounds}.`);
            return;
          }
        }
        if(team.squad.length>=18){ draw("<span class='train-fail'>Squad full — release a player before signing more.</span>"); return; }
        team.budget -= currentBid;
        team.squad.push(player);
        saveGame();
        idx++;
        showSoldScreen(`SOLD! ${esc(player.name)} joins your squad for ${fmtMoney(currentBid)}!`, true);
      };
    }

    function showSoldScreen(message, wonByUser){
      show(`<div class="screen auction-screen">
        <div class="topbar"><h2>🔨 Player Auction</h2></div>
        <div class="card"><span class="${wonByUser?'train-success':'train-fail'}">${message}</span></div>
        <button class="btn btn-primary btn-block" id="btnNextAuction">Continue</button>
      </div>`);
      document.getElementById("btnNextAuction").onclick = ()=> nextPlayer();
    }

    draw();
  }
  nextPlayer();
}

/* =========================================================
   CRICKET LEAGUE MANAGER 26 — ui-ultimate.js
   Ultimate Clash: a locked exhibition gauntlet unlocked after
   winning 5 league titles. The user's team faces the single
   top-rated team from every OTHER league, one after another,
   in a single-elimination gauntlet. Results never touch league
   standings, fixtures, or playoff state.
   ========================================================= */

const UC_PRIZE_WIN = 250000;
const UC_PRIZE_CHAMPION_BONUS = 1500000;

function titlesWonCount(team){
  return (team.seasonHistory||[]).filter(h=>h.isChampion).length;
}

function isUltimateClashUnlocked(team){
  return titlesWonCount(team) >= ULTIMATE_CLASH_TITLES_REQUIRED;
}

/* Picks the single highest-rated team from every league other than the
   user's own, one opponent per league. */
function pickUltimateClashOpponents(userTeam){
  const opponents = [];
  Game.universe.leagues.forEach(league=>{
    if(league.id===userTeam.leagueId) return;
    const top = [...league.teams].sort((a,b)=>b.rating-a.rating)[0];
    if(top) opponents.push({ teamId: top.id, leagueId: league.id, leagueName: league.name });
  });
  return opponents;
}

function pickNeutralVenue(){
  const allTeams = [];
  Game.universe.leagues.forEach(l=> l.teams.forEach(t=> allTeams.push(t)));
  const stadium = allTeams[rand(0, allTeams.length-1)].stadium;
  return { stadium, ...randomVenueConditions() };
}

/* ---------------------------- Hub screen ----------------------------------- */
function renderUltimateClash(){
  const team = getUserTeam();
  const unlocked = isUltimateClashUnlocked(team);
  const titles = titlesWonCount(team);

  if(!unlocked){
    show(`<div class="screen">
      <div class="topbar"><button class="icon-btn" id="btnBack">←</button><h2>Ultimate Clash</h2></div>
      <div class="card uc-locked-card">
        <div class="uc-lock-icon">🔒</div>
        <h3>Locked</h3>
        <p class="muted small">Face the single best team from every other league in a winner-takes-all gauntlet —
        but first, prove your own franchise belongs among the greats.</p>
        <div class="uc-progress-wrap">
          <div class="progress-bar"><div class="progress-fill" style="width:${clamp((titles/ULTIMATE_CLASH_TITLES_REQUIRED)*100,0,100)}%"></div></div>
          <div class="muted small" style="margin-top:6px;">${titles} / ${ULTIMATE_CLASH_TITLES_REQUIRED} League Titles Won</div>
        </div>
      </div>
    </div>`);
    document.getElementById("btnBack").onclick = renderDashboard;
    return;
  }

  const opponents = pickUltimateClashOpponents(team);
  const ucTitles = team.ultimateClashTitles||0;
  const bestRun = team.ultimateClashBestRun||0;
  const inProgress = Game.ultimateClash && Game.ultimateClash.active;

  const oppRows = opponents.map((o,i)=>{
    const oppTeam = getTeamAnywhere(o.teamId);
    const beaten = inProgress ? i<Game.ultimateClash.currentIndex : false;
    const isNext = inProgress && i===Game.ultimateClash.currentIndex;
    return `<div class="uc-opponent-row ${beaten?'uc-beaten':''} ${isNext?'uc-next':''}">
      <span class="uc-round-num">${i+1}</span>
      ${teamBadge(oppTeam,34)}
      <div class="player-main">
        <div class="player-name">${esc(oppTeam.name)}</div>
        <div class="muted small">${esc(o.leagueName)} • OVR ${oppTeam.rating}</div>
      </div>
      <div class="uc-status">${beaten?"✅":isNext?"▶️":"—"}</div>
    </div>`;
  }).join("");

  show(`<div class="screen">
    <div class="topbar"><button class="icon-btn" id="btnBack">←</button><h2>Ultimate Clash</h2></div>
    <div class="card uc-hero-card">
      <div class="uc-trophy-icon">🌍🏆</div>
      <p class="muted small">One team from every other league. Beat all ${opponents.length} in a row to become
      Ultimate Champion. Lose once, and the gauntlet ends — but you can always try again.</p>
    </div>
    <div class="card">
      <div class="stat-grid">
        <div class="stat-box"><span>${ucTitles}</span><label>Ultimate Titles</label></div>
        <div class="stat-box"><span>${bestRun}/${opponents.length}</span><label>Best Run</label></div>
      </div>
    </div>
    <div class="card">${oppRows}</div>
    <button class="btn btn-primary btn-block sticky-btn" id="btnStartUC">${inProgress?"Continue Gauntlet":"Begin Ultimate Clash"}</button>
  </div>`);
  document.getElementById("btnBack").onclick = renderDashboard;
  document.getElementById("btnStartUC").onclick = ()=>{
    if(!inProgress){
      Game.ultimateClash = { opponents: opponents.map(o=>o.teamId), leagueNames: opponents.map(o=>o.leagueName), currentIndex: 0, active: true };
      saveGame();
    }
    launchUltimateClashMatch();
  };
}

/* ---------------------------- Match flow ------------------------------------ */
function launchUltimateClashMatch(){
  const uc = Game.ultimateClash;
  const userTeam = getUserTeam();
  const opponentId = uc.opponents[uc.currentIndex];
  const opponent = getTeamAnywhere(opponentId);
  autoPickXI(opponent);
  if(!userTeam.playingXI) autoPickXI(userTeam);

  const fixture = {
    id: "uc"+uc.currentIndex, stage: "Ultimate Clash",
    matchday: `Round ${uc.currentIndex+1}/${uc.opponents.length}`,
    homeId: userTeam.id, awayId: opponent.id,
    played:false, result:null
  };
  Game.pendingFixture = fixture;
  Game.pendingVenue = pickNeutralVenue();
  renderLineupsPreview(fixture, ()=> renderPreMatch(fixture));
}

/* Separate from finalizeMatch: Ultimate Clash results never touch league
   standings, fixtures, quick-sim, or playoff state. */
function finalizeUltimateClashMatch(match){
  transferStatsToPlayers(match);
  const potmDetail = pickPlayerOfMatch(match);
  const inn1 = match.innings[0], inn2 = match.innings[1];
  const home = match.home, away = match.away;
  const homeInn = inn1.battingTeam.id===home.id ? inn1 : inn2;
  const awayInn = inn1.battingTeam.id===home.id ? inn2 : inn1;
  const homeScore = homeInn.score, homeWkts = homeInn.wickets;
  const awayScore = awayInn.score, awayWkts = awayInn.wickets;

  let winner = null;
  if(homeScore>awayScore) winner = home; else if(awayScore>homeScore) winner = away;

  const fixture = Game.pendingFixture;
  fixture.played = true;
  fixture.result = {
    homeScore, homeWkts, awayScore, awayWkts, winnerId: winner?winner.id:null,
    potm: potmDetail?potmDetail.player.name:null, resultText: match.resultText
  };

  const userTeam = getUserTeam();
  const userWon = winner && winner.id===userTeam.id;
  const reward = userWon ? UC_PRIZE_WIN : Math.round(UC_PRIZE_WIN*0.25);
  userTeam.budget += reward;
  fixture.result.reward = { home: home.id===userTeam.id?reward:0, away: away.id===userTeam.id?reward:0 };
  if(userWon){
    userTeam.fanBase = clamp(Math.round(userTeam.fanBase + rand(3000,8000)), 5000, 600000);
    userTeam.reputation = clamp(userTeam.reputation + 2, 0, 100);
  }

  fixture.result.potmDetail = potmDetail ? {
    name: potmDetail.player.name, team: potmDetail.team.short,
    battingLine: potmDetail.battingLine, bowlingLine: potmDetail.bowlingLine,
    overseas: potmDetail.player.overseas
  } : null;
  fixture.result.analysis = generateExpertAnalysis(match, fixture, potmDetail);

  tickPlayerAvailability(userTeam);
  maybeInjurePlayers(userTeam, userTeam.playingXI);
  saveGame();
}

/* Called from the match result screen's Continue button when the fixture
   stage is "Ultimate Clash". Advances the gauntlet, or ends it. */
function advanceUltimateClash(){
  const fixture = Game.pendingFixture;
  const userTeam = getUserTeam();
  const uc = Game.ultimateClash;
  const won = fixture.result.winnerId===userTeam.id;

  Game.currentMatch = null; Game.pendingFixture = null;

  if(!won){
    uc.active = false;
    userTeam.ultimateClashBestRun = Math.max(userTeam.ultimateClashBestRun||0, uc.currentIndex);
    saveGame();
    renderUltimateClashEliminated(uc.currentIndex, uc.opponents.length);
    return;
  }

  uc.currentIndex += 1;
  if(uc.currentIndex>=uc.opponents.length){
    userTeam.ultimateClashTitles = (userTeam.ultimateClashTitles||0) + 1;
    userTeam.ultimateClashBestRun = uc.opponents.length;
    userTeam.budget += UC_PRIZE_CHAMPION_BONUS;
    uc.active = false;
    saveGame();
    renderUltimateClashChampion();
    return;
  }
  saveGame();
  launchUltimateClashMatch();
}

function renderUltimateClashEliminated(roundsWon, totalRounds){
  show(`<div class="screen champion-screen">
    <div class="uc-lock-icon" style="font-size:60px;">💔</div>
    <h1>Gauntlet Over</h1>
    <p>You won ${roundsWon} of ${totalRounds} matches before being eliminated.</p>
    <p class="muted small">Regroup, strengthen the squad, and take another shot at the Ultimate Clash anytime.</p>
    <button class="btn btn-primary btn-block" id="btnUCBackDash">Back to Dashboard</button>
  </div>`);
  document.getElementById("btnUCBackDash").onclick = renderDashboard;
}

function renderUltimateClashChampion(){
  const team = getUserTeam();
  show(`<div class="screen champion-screen">
    <div class="confetti"></div>
    ${teamBadge(team,100)}
    <h1>🌍🏆 ULTIMATE CHAMPIONS</h1>
    <p>${esc(team.name)} have beaten the best team from every league!</p>
    <p class="muted small">Ultimate Titles: ${team.ultimateClashTitles} • Bonus: ${fmtMoney(UC_PRIZE_CHAMPION_BONUS)}</p>
    <button class="btn btn-primary btn-block" id="btnUCBackDash">Back to Dashboard</button>
  </div>`);
  document.getElementById("btnUCBackDash").onclick = renderDashboard;
}
