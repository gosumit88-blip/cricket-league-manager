name: Build Android APK and AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Project & Build APK/AAB
      run: |
        # 1. Ek naya Cordova project banayein
        cordova create game_project com.sumit.cricketmanager "Cricket League Manager"
        
        # 2. Project folder ke andar jayein
        cd game_project
        
        # 3. Default config aur files delete karein
        rm -rf www/*
        rm -f config.xml
        
        # 4. Apni config.xml, index.html aur icon-512.png copy karein
        cp ../index.html www/
        cp ../icon-512.png .
        cp ../config.xml .
        
        # 5. Android platform add karein
        cordova platform add android --no-telemetry
        
        # 6. Testing ke liye APK build karein (Debug)
        cordova build android --no-telemetry
        
        # 7. Play Store ke liye AAB bundle build karein (Release)
        cordova build android --release -- --packageType=bundle --no-telemetry

    - name: Upload APK and AAB to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Android-Game-Builds
        path: |
          game_project/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          game_project/platforms/android/app/build/outputs/bundle/release/app-release.aab
