name: Build Android APK and AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Bubblewrap
      run: npm install -g @bubblewrap/cli

    - name: Configure Bubblewrap Paths
      run: |
        mkdir -p ~/.bubblewrap
        echo '{"jdkPath":"'"$JAVA_HOME"'","androidSdkPath":"'"$ANDROID_HOME"'"}' > ~/.bubblewrap/config.json

    - name: Initialize App Project
      run: |
        # Yahan humne domain override kar diya hai taaki Invalid URL error na aaye
        bubblewrap init --manifest=manifest.json --meta-validate=false --interactive=false --host=localhost --pagePath=/index.html

    - name: Build APK and AAB files
      run: |
        bubblewrap build --skipSigning

    - name: Upload Files to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Android-Game-Builds
        path: |
          *.apk
          *.aab
